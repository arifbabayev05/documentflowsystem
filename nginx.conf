server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;

    # If basePath is /legal12, files are in /usr/share/nginx/html/legal12
    location ^~ /legal12 {
        index index.html index.htm;
        try_files $uri $uri/ /legal12/index.html;
    }

    # Fallback for root (if accessed directly without /legal12)
    location / {
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
    }
}
